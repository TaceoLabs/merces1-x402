# Bridges this demo to the @x402/* packages living in the x402 fork.
#
# Assumed directory layout (colleague: adjust the relative paths below if your
# checkout of the x402 fork lives somewhere else):
#
#   <some-parent>/
#   ├── Merces1_updated/                 <-- this repo
#   │   └── x402-demo/                   <-- you are here
#   └── x402/
#       └── repo/
#           └── typescript/packages/*    <-- @x402/core, @x402/evm, etc.
#
# Required branch on the x402 fork: feat/real-mpc-integration
#   (TaceoLabs/x402 — ships the Merces compressed-proof types + facilitator
#   verify/settle. Not yet pushed at the time this branch was cut — see README.)
packages:
  - "."
  - "../../x402/repo/typescript/packages/core"
  - "../../x402/repo/typescript/packages/mechanisms/evm"
  - "../../x402/repo/typescript/packages/http/axios"
  - "../../x402/repo/typescript/packages/http/express"
