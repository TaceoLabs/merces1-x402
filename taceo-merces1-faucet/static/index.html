          Wallet Address

          id="address"

        </p>

        <!-- Button -->
        <button
          id="claimBtn"
          onclick="claim()"

        >
          <span id="btnText">Send 1,000 Confidential USDC</span>
          <svg id="spinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-30" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>

        <!-- Status -->
        <div id="status" class="hidden mt-4 rounded-xl px-4 py-3 text-sm leading-relaxed break-all"></div>

      </div>

    </div>

  <script>
    async function claim() {
      const input   = document.getElementById('address');
      const btn     = document.getElementById('claimBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const status  = document.getElementById('status');

      const address = input.value.trim();

      if (!/^0x[0-9a-fA-F]{40}$/.test(address)) {
        showStatus('error', 'Please enter a valid Ethereum address (0x…).');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Requesting…';
      spinner.classList.remove('hidden');
      status.className = 'hidden';

      try {
        const res = await fetch(`/claim/${address}`, { method: 'POST' });

        if (res.ok) {
          showStatus('success', `✓ Tokens sent to ${address}. Check back in 24 hours for another claim.`);
          input.value = '';
        } else {
          const msg = await res.text();
          if (res.status === 429) {
            showStatus('error', `${msg || 'This address already claimed tokens. Try again after 24 hours.'}`);
          } else {
            showStatus('error', `${msg || 'Something went wrong. Please try again.'}`);
          }
        }
      } catch {
        showStatus('error', 'Network error — make sure the faucet is reachable.');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Request Tokens';
        spinner.classList.add('hidden');
      }
    }

    function showStatus(type, msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type === 'success'
        ? 'mt-4 rounded-xl px-4 py-3 text-sm leading-relaxed break-all bg-emerald-50 border border-emerald-200 text-emerald-700'
        : 'mt-4 rounded-xl px-4 py-3 text-sm leading-relaxed break-all bg-red-50 border border-red-200 text-red-600';
    }

    document.getElementById('address').addEventListener('keydown', e => {
      if (e.key === 'Enter') claim();
    });
  </script>
